<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GU Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0f0e;--surface:#141714;--surface2:#1a1d1a;--surface3:#202420;--border:#2a2f2a;--accent:#b8ff57;--accent2:#57ffb8;--accent3:#ffd557;--accent4:#ff8c57;--text:#e8ede8;--text2:#8a9e8a;--text3:#4a5a4a;--shipped:#b8ff57;--unshipped:#ff5757;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:15px;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
.app{max-width:820px;margin:0 auto;padding:24px 20px 100px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.header-left h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;letter-spacing:-.02em;line-height:1}
.header-left h1 span{color:var(--accent)}
.header-left p{color:var(--text2);font-size:.78rem;margin-top:5px;font-family:'DM Mono',monospace;letter-spacing:.05em;text-transform:uppercase}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.streak-badge{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;text-align:center;min-width:80px}
.streak-badge .num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--accent);line-height:1}
.streak-badge .label{font-size:.68rem;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.sync-status{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text3);display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.06em}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.sync-dot.synced{background:var(--accent)}.sync-dot.syncing{background:var(--accent3);animation:pulse 1s infinite}.sync-dot.error{background:var(--unshipped)}
.top-nav{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:20px;overflow-x:auto}
.top-nav button{flex:1;padding:8px 10px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;transition:all .2s;white-space:nowrap}
.top-nav button.active{background:var(--surface3);color:var(--accent);border:1px solid var(--border)}
.top-nav button:hover:not(.active){color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.card-title{font-family:'DM Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.card-title.green{color:var(--accent2)}.card-title.gold{color:var(--accent3)}.card-title.orange{color:var(--accent4)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--accent);line-height:1}
.stat-label{font-family:'DM Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-top:3px}
.date-picker-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.date-picker-row label{font-family:'DM Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);white-space:nowrap}
.date-picker-row input[type=date]{background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;outline:none;cursor:pointer;flex:1;color-scheme:dark}
.date-today-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .15s;white-space:nowrap}
.date-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.past-day-banner{background:rgba(255,213,87,.07);border:1px solid rgba(255,213,87,.2);border-radius:8px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent3);margin-bottom:12px;display:none}
.past-day-banner.visible{display:block}
.date-display{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:3px}
.date-sub{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.intro-formula{background:rgba(184,255,87,.05);border:1px solid rgba(184,255,87,.15);border-radius:8px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);margin-bottom:14px;line-height:1.5}
.check-group{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:9px 11px;border-radius:8px;border:1px solid transparent;transition:all .15s;user-select:none}
.check-item:hover{background:var(--surface2);border-color:var(--border)}
.check-item.checked{background:rgba(184,255,87,.05);border-color:rgba(184,255,87,.15)}
.checkmark{width:20px;height:20px;border:1.5px solid var(--border);border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface2)}
.check-item.checked .checkmark{background:var(--accent);border-color:var(--accent)}
.checkmark svg{display:none}.check-item.checked .checkmark svg{display:block}
.check-label{color:var(--text2);font-size:.88rem;line-height:1.4;pointer-events:none}
.check-item.checked .check-label{color:var(--text)}
.field-label{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.text-input,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;width:100%;outline:none;transition:border-color .15s;resize:vertical}
.text-input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:75px}
.reach-outs{display:flex;flex-direction:column;gap:5px;margin-top:7px}
.reach-out-row{display:flex;gap:8px;align-items:center}
.reach-out-num{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text3);width:18px;flex-shrink:0}
.people-log{display:flex;flex-direction:column;gap:10px;margin-top:7px}
.person-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px}
.person-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.person-card-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.person-card-remove{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:all .15s}
.person-card-remove:hover{color:var(--unshipped);background:rgba(255,87,87,.1)}
.person-stage-row{margin-top:8px}
.person-stage-label{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.person-stages{display:flex;flex-wrap:wrap;gap:5px}
.person-stage-pill{padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface3);color:var(--text3);font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;user-select:none}
.person-stage-pill:hover{border-color:var(--accent2);color:var(--accent2)}
.person-stage-pill.active{background:rgba(87,255,184,.12);border-color:var(--accent2);color:var(--accent2)}
.add-person-btn{background:transparent;border:1px dashed var(--border);border-radius:8px;padding:7px 13px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .15s;margin-top:5px;text-transform:uppercase;letter-spacing:.06em;width:100%}
.add-person-btn:hover{border-color:var(--accent);color:var(--accent)}
.shipped-row{display:flex;gap:10px;margin-top:3px}
.shipped-btn{flex:1;padding:13px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.shipped-btn.yes:hover,.shipped-btn.yes.active{background:rgba(184,255,87,.1);border-color:var(--shipped);color:var(--shipped)}
.shipped-btn.no:hover,.shipped-btn.no.active{background:rgba(255,87,87,.1);border-color:var(--unshipped);color:var(--unshipped)}
.submit-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius);color:#0d0f0e;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s;margin-top:10px}
.submit-btn:hover{background:#ccff77;transform:translateY(-1px)}
.submit-btn:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;transform:none}
.ai-response{background:var(--surface2);border:1px solid rgba(184,255,87,.2);border-radius:var(--radius);padding:18px;margin-top:14px;display:none}
.ai-response.visible{display:block}
.ai-response.gold{border-color:rgba(255,213,87,.25)}
.ai-response.orange{border-color:rgba(255,140,87,.25)}
.ai-response-header{font-family:'DM Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-response.gold .ai-response-header{color:var(--accent3)}
.ai-response.orange .ai-response-header{color:var(--accent4)}
.ai-dot{width:6px;height:6px;border-radius:50%;animation:pulse 1.5s infinite;background:var(--accent)}
.ai-response.gold .ai-dot{background:var(--accent3)}
.ai-response.orange .ai-dot{background:var(--accent4)}
.ai-text{color:var(--text);font-size:.88rem;line-height:1.75;white-space:pre-wrap}
.heatmap{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.heatmap-day{width:20px;height:20px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:transform .1s}
.heatmap-day:hover{transform:scale(1.25);z-index:2}
.heatmap-day.shipped{background:var(--accent);border-color:var(--accent)}
.heatmap-day.not-shipped{background:rgba(255,87,87,.3);border-color:rgba(255,87,87,.4)}
.heatmap-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text3)}
.legend-dot{width:13px;height:13px;border-radius:3px}
.history-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:all .15s}
.history-item:hover{border-color:var(--accent)}
.history-item-header{display:flex;justify-content:space-between;align-items:center}
.history-date{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.shipped-tag{font-family:'DM Mono',monospace;font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:500}
.shipped-tag.yes{background:rgba(184,255,87,.15);color:var(--accent)}
.shipped-tag.no{background:rgba(255,87,87,.15);color:var(--unshipped)}
.history-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.83rem;color:var(--text2);line-height:1.6}
.history-item.open .history-detail{display:block}
.review-btn{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left;display:flex;align-items:center;gap:10px}
.review-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.review-btn.monthly:hover{border-color:var(--accent3);color:var(--accent3)}
.review-btn-sub{font-size:.65rem;color:var(--text3);margin-top:2px;text-transform:none;letter-spacing:0;font-family:'DM Sans',sans-serif}
.contacts-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-family:'DM Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .15s;user-select:none}
.filter-pill:hover{border-color:var(--accent);color:var(--accent)}
.filter-pill.active{background:rgba(184,255,87,.1);border-color:var(--accent);color:var(--accent)}
.contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.contact-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;cursor:pointer;transition:all .15s;position:relative}
.contact-card:hover{border-color:var(--accent)}
.contact-card.selected{border-color:var(--accent);background:rgba(184,255,87,.04)}
.contact-card.core{border-color:rgba(184,255,87,.12)}
.contact-icon{font-size:1.4rem;margin-bottom:5px}
.contact-name{font-weight:600;font-size:.9rem;color:var(--text);margin-bottom:2px}
.contact-arch{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.viability-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em}
.vb-emerald{background:rgba(6,78,59,.5);color:#6ee7b7;border:1px solid #065f46}
.vb-blue{background:rgba(30,58,138,.5);color:#93c5fd;border:1px solid #1e40af}
.vb-yellow{background:rgba(113,63,18,.5);color:#fcd34d;border:1px solid #92400e}
.vb-gray{background:rgba(31,41,55,.5);color:#9ca3af;border:1px solid #374151}
.vb-new{background:rgba(87,255,184,.08);color:var(--accent2);border:1px solid rgba(87,255,184,.3)}
.stage-mini-bar{display:flex;gap:2px;margin-top:7px}
.stage-mini-seg{height:3px;flex:1;border-radius:3px;background:var(--border)}
.stage-mini-seg.filled{background:var(--accent)}
.stage-mini-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text3);margin-top:3px}
.contact-meta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.contact-meta-item{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text3)}
.contact-meta-item span{color:var(--text2)}
.pipeline-badge{position:absolute;top:10px;right:10px;background:rgba(87,255,184,.1);border:1px solid rgba(87,255,184,.25);color:var(--accent2);font-family:'DM Mono',monospace;font-size:.58rem;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em}
.reach-count-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(184,255,87,.07);border:1px solid rgba(184,255,87,.18);color:var(--accent);border-radius:10px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:.62rem}
.contact-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16
