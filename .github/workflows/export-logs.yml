name: Export Logs to JSON

on:
  schedule:
    - cron: '45 0 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch logs from Supabase
        run: |
          mkdir -p data
          curl -s \
            "https://kkerejaviuqnaalbbnfs.supabase.co/rest/v1/shipped_logs?order=date.desc&limit=100" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -o data/logs.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/logs.json
          git diff --staged --quiet || git commit -m "Daily log export $(date +%Y-%m-%d)"
          git push
